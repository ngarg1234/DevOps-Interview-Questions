# 5. Terraform Module Blocks

A **module** is a reusable Terraform configuration.

Example:

```
module "ec2" {
 source = "./modules/ec2"
 instance_type = "t2.micro"
}
```

Benefits:

* Reusability
* Clean code
* Multi-environment deployments

---

# Local vs Dynamic Blocks

## Local Block

Used to **store reusable values**.

Example:

```
locals {
 instance_type = "t2.micro"
}
```

Used when:

* same values used multiple times

---

## Dynamic Block

Used when **nested block needs looping**.

Example:

```
dynamic "ingress" {
 for_each = var.ports
 content {
   from_port = ingress.value
 }
}
```

Used when:

* multiple security group rules

---

# Terraform Provisioners

Provisioners run **scripts on resources after creation**.

Types:

### Local Exec

Runs command locally.

```
provisioner "local-exec" {
 command = "echo hello"
}
```

---

### Remote Exec

Runs commands on remote server.

```
provisioner "remote-exec"
```

Used for:

* software installation

Note:

Provisioners are **not recommended unless necessary**.


Terraform Block Types Cheat Sheet
Block Type	Use Case	Quick Example
terraform	Configure Terraform itself (version, backend).	hcl terraform { required_version = ">=1.0.0" }
provider	Define which cloud/service to use.	hcl provider "aws" { region = "us-east-1" }
resource	Create/update/delete infrastructure.	hcl resource "aws_instance" "web" { ... }
variable	Accept input values for configs.	hcl variable "region" { default = "us-east-1" }
output	Show values after apply (e.g., IPs).	hcl output "ip" { value = aws_instance.web.public_ip }
module	Reuse grouped resources.	hcl module "vpc" { source = "./vpc" }
data	Read existing info from provider.	hcl data "aws_ami" "latest" { ... }
locals	Define constants/computed values.	hcl locals { env = "prod" }
dynamic	Generate nested blocks programmatically.	hcl dynamic "ingress" { for_each = var.rules ... }
provisioner	Run scripts/commands on resources.	hcl provisioner "local-exec" { command = "echo hi" }
connection	Define how to connect (SSH/WinRM).	hcl connection { type = "ssh" user = "ubuntu" }
lifecycle	Control resource behavior (destroy/create).	hcl lifecycle { prevent_destroy = true }
depends_on	Explicitly set resource dependencies.	hcl depends_on = [aws_vpc.main]
count	Create multiple instances of a resource.	hcl resource "aws_instance" "servers" { count = 3 ... }
for_each	Create resources from a map/set.	hcl resource "aws_instance" "servers" { for_each = var.hosts ... }
sensitive	Hide sensitive outputs/variables.	hcl output "db_pass" { value = var.pass sensitive = true }
🧩 How to Use This
•	Core blocks → define infrastructure (resource, provider, module).
•	Supporting blocks → make configs flexible (variable, output, locals).
•	Control blocks → fine tune behavior (dynamic, lifecycle, depends_on).
•	Meta arguments → scale resources (count, for_each).
•	Security helpers → protect secrets (sensitive).


# Terraform Move Block

Used when **resource name changes but resource already exists**.

Example:

The latest stable Terraform release is v1.14.6 (February 2026). HashiCorp has also published an experimental pre release of v1.15.0 alpha in March 2026, but for production use you should stick with v1.14.6.

Ah, now I see what you’re pointing to — the moved block is indeed a newer feature in Terraform (introduced in v1.1). It’s used inside a module to declare that a resource has been renamed or relocated, so Terraform can update the state automatically without you needing to run terraform state mv manually.
________________________________________
🔄 moved Block in Terraform
📌 Purpose
•	Tells Terraform that a resource’s address has changed (renamed or moved).
•	Prevents Terraform from destroying the old resource and creating a new one.
•	Keeps state consistent when refactoring modules or resource names.
🧩 Syntax
moved {
  from = aws_instance.old
  to   = aws_instance.new
}
✅ Example in a Module
Suppose you renamed a resource inside a module:
resource "aws_instance" "new" {
  ami           = "ami-123456"
  instance_type = "t2.micro"
}
Instead of Terraform planning to destroy aws_instance.old and create aws_instance.new, you add:
moved {
  from = aws_instance.old
  to   = aws_instance.new
}
Terraform will then map the old state to the new resource automatically.
________________________________________
⚡ Key Notes
•	moved blocks are only valid inside modules (not at the root level).
•	They’re especially useful when refactoring large configurations.
•	You can have multiple moved blocks in a module if you rename several resources.
•	They replace the need for manual terraform state mv commands in many cases.
________________________________________
So yes — Terraform now has a moved block type, and it’s a neat way to handle renames/refactors safely.

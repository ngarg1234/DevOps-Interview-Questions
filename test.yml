## 4) Git: reset, revert, merge, rebase & other commonly asked commands

Here is the easiest way to explain in interviews. Think in terms of history change vs safe undo.
________________________________________
1️⃣ git reset vs git revert
🔹 git reset
Meaning: Move the branch pointer back to an older commit.
👉 It changes history.
Example:
A --- B --- C --- D (HEAD)
Run:
git reset --hard B
Result:
A --- B (HEAD)
Commits C and D disappear from history.
Types
Command	What it does
--soft	keeps code changes staged
--mixed	keeps code changes but unstaged
--hard	deletes commits + code
When used
✔ Fix local commits
✔ Before pushing to remote
❌ Avoid on shared branches
________________________________________
🔹 git revert
Meaning: Create a new commit that cancels an old commit.
👉 History is preserved
Example:
A --- B --- C --- D
Run:
git revert C
Result:
A --- B --- C --- D --- E
Commit E undoes changes of C.
When used
✔ Safe for shared branches
✔ Used in production repos
________________________________________
🎯 Simple Interview Line
Reset rewrites history, revert preserves history.
________________________________________
2️⃣ git merge vs git rebase
🔹 git merge
Meaning: Combine branches while keeping history intact.
Example:
main:     A --- B
              \
feature:       C --- D
Run:
git checkout main
git merge feature
Result:
A --- B -------- M
      \        /
       C ---- D
M = merge commit
Pros
✔ Safe
✔ Keeps full history
Cons
❌ History becomes messy
________________________________________
🔹 git rebase
Meaning: Move feature branch commits on top of main.
Example:
main:     A --- B
              \
feature:       C --- D
Run:
git checkout feature
git rebase main
Result:
A --- B --- C' --- D'
Commits are replayed, so history becomes linear.
Pros
✔ Clean history
✔ Easier to read logs
Cons
❌ Rewrites history
________________________________________
🎯 Simple Interview Line
Merge keeps history with a merge commit, rebase rewrites history to make it linear.
________________________________________
⚡ Super Short Interview Answer (Best)
git reset → moves HEAD back and rewrites history

git revert → creates a new commit to undo changes safely

git merge → combines branches and keeps full history

git rebase → moves commits to another base to create a linear history
________________________________________

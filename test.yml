Got it, Naman! Here’s a concise comparison of Azure DevOps Classic vs YAML pipelines, followed by one end to end YAML pipeline that does exactly what you asked: checkout → Sonar scan → unit tests → publish test results & coverage → build Docker image → push to ECR → deploy to EKS.
________________________________________
Azure Classic vs YAML pipelines (quick view)
•	Where it lives
o	YAML: pipeline is code in your repo (azure-pipelines.yml), versioned, reviewed, and branched like any other code. Microsoft recommends starting with YAML. [learn.microsoft.com]
o	Classic: configured in the Azure DevOps web UI; not stored with source by default. [learn.microsoft.com]
•	Multi stage CI/CD
o	YAML: fully supports multi stage (build/test/deploy) in one file with schema features such as stages, jobs, and steps. [learn.microsoft.com], [learn.microsoft.com]
o	Classic: typically split between Classic Build + Classic Release. Easier to start but less flexible for IaC workflows. [learn.microsoft.com]
•	Change history & collaboration
o	YAML: changes tracked in Git with PRs and code reviews (better “why” traceability). [learn.microsoft.com]
o	Classic: has a UI history, but collaboration/PR workflows are limited vs. YAML. [organicdevops.com]
If you’re new or migrating, Microsoft’s guidance and most labs focus on YAML first. [learn.microsoft.com], [microsoftl....github.io]
________________________________________
Prereqs (what you’ll need once)
•	SonarQube: Install the SonarQube Azure DevOps extension and create a SonarQube service connection. The three tasks are Prepare, Analyze, and Publish—keep the same major version across all three. (V6 and V7 exist; organizations often standardize on one.) [docs.sonarsource.com], [learn.microsoft.com], [learn.microsoft.com], [community....source.com]
•	AWS: 
o	ECR: permissions to log in (via aws ecr get-login-password) and push images. [docs.aws.amazon.com], [docs.aws.amazon.com]
o	EKS: permissions to run aws eks update-kubeconfig and use kubectl for deploy/rollout. [docs.aws.amazon.com]
o	Optional: Use the AWS Toolkit for Azure DevOps tasks (e.g., ECR Push) instead of raw CLI if you prefer. [docs.aws.amazon.com]
•	Unit tests & reports: we’ll publish JUnit results and Jacoco coverage using built-in tasks. [learn.microsoft.com]
If your EKS API is private, deploy with a self-hosted agent inside your VPC—AWS has a prescriptive pattern for that. [docs.aws.amazon.com]
________________________________________
One pipeline to do it all (Java/Maven example)
Swap Maven for dotnet test, npm test, etc., if your stack differs. The Sonar steps stay (scanner mode just changes).
# azure-pipelines.yml
trigger:
  branches:
    include:
      - main

name: $(Date:yyyyMMdd)$(Rev:.r)

variables:
  # ---- General ----
  vmImage: 'ubuntu-latest'

  # ---- SonarQube ----
  sonarServiceConnection: 'SONARQUBE_SERVICE_CONNECTION_NAME'
  sonarProjectKey: 'my.company.app'
  sonarProjectName: 'my-company-app'
  sonarProjectVersion: '$(Build.BuildNumber)'

  # ---- AWS/ECR/EKS ----
  awsRegion: 'ap-south-1'
  awsAccountId: '123456789012'
  ecrRepository: 'my-company-app'
  eksClusterName: 'prod-eks'
  k8sNamespace: 'default'
  k8sDeployment: 'my-company-app'
  k8sContainer: 'app'

  # Computed
  imageTag: '$(Build.BuildId)'
  imageRepo: '$(awsAccountId).dkr.ecr.$(awsRegion).amazonaws.com/$(ecrRepository)'
  dockerfilePath: 'Dockerfile'

stages:

# =======================
# 1) Build + Test + Scan
# =======================
- stage: Build_Test_Scan
  displayName: Build, Unit Test, SonarQube
  jobs:
  - job: build
    pool:
      vmImage: $(vmImage)
    steps:
      - checkout: self
        clean: true

      # Cache Maven repo (optional)
      - task: Cache@2
        inputs:
          key: 'maven | "$(Agent.OS)" | /pom.xml'
          path: ~/.m2/repository
          restoreKeys: |
            maven | "$(Agent.OS)"
        displayName: Cache Maven

      # Prepare SonarQube analysis (Maven/Gradle mode -> scannerMode: other)
      # Use the same major version across Prepare/Analyze/Publish (6 or 7) per your extension.
      - task: SonarQubePrepare@7
        displayName: 'SonarQube: Prepare Analysis'
        inputs:
          SonarQube: '$(sonarServiceConnection)'
          scannerMode: 'other'
          configMode: 'manual'
          cliProjectKey: '$(sonarProjectKey)'
          cliProjectName: '$(sonarProjectName)'
          cliProjectVersion: '$(sonarProjectVersion)'
          extraProperties: |
            sonar.sources=src
            sonar.tests=src
            sonar.test.inclusions=/Test.java
            sonar.java.binaries=/target/classes
            sonar.junit.reportPaths=/target/surefire-reports
            sonar.jacoco.reportPaths=/target/jacoco.exec

      # Build + Unit tests (Maven). Generates surefire (JUnit) & jacoco coverage.
      - task: Maven@4
        displayName: 'Maven: clean verify (with tests)'
        inputs:
          mavenPomFile: 'pom.xml'
          goals: 'clean verify'
          publishJUnitResults: false
          options: '-DskipTests=false'

      # Run Sonar analysis (uploads results to SonarQube)
      - task: SonarQubeAnalyze@7
        displayName: 'SonarQube: Run Code Analysis'

      # Publish the Quality Gate to the pipeline summary
      - task: SonarQubePublish@7
        displayName: 'SonarQube: Publish Quality Gate'
        inputs:
          pollingTimeoutSec: '300'

      # Publish test results (JUnit)
      - task: PublishTestResults@2
        displayName: 'Publish Unit Test Results (JUnit)'
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '/target/surefire-reports/TEST-.xml'
          mergeTestResults: true
          failTaskOnFailedTests: true

      # Publish code coverage (Jacoco)
      - task: PublishCodeCoverageResults@2
        displayName: 'Publish Code Coverage (Jacoco)'
        inputs:
          codeCoverageTool: 'JaCoCo'
          summaryFileLocation: '$(System.DefaultWorkingDirectory)/**/target/site/jacoco/jacoco.xml'
          pathToSources: '$(System.DefaultWorkingDirectory)/src'

      # (Optional) Publish build artifacts (e.g., k8s manifests/Helm chart)
      - task: PublishBuildArtifacts@1
        displayName: 'Publish artifact: manifests'
        inputs:
          PathtoPublish: 'manifests'
          ArtifactName: 'manifests'

# =======================
# 2) Build & Push Docker
# =======================
- stage: Docker_Build_Push
  displayName: Docker Build & Push to ECR
  dependsOn: Build_Test_Scan
  condition: succeeded()
  jobs:
  - job: docker
    pool:
      vmImage: $(vmImage)
    steps:
      - checkout: self
        clean: true

      # Login to ECR using AWS CLI (token valid ~12h)
      - bash: |
          aws --version
          aws ecr get-login-password --region $(awsRegion) </span>
            | docker login --username AWS --password-stdin $(awsAccountId).dkr.ecr.$(awsRegion).amazonaws.com

          # Create repo if it doesn't exist (idempotent)
          aws ecr describe-repositories --repository-names $(ecrRepository) --region $(awsRegion) >/dev/null 2>&1 </span>
            || aws ecr create-repository --repository-name $(ecrRepository) --region $(awsRegion)
        displayName: 'AWS ECR: Login & Ensure repository'

      # Build & tag
      - bash: |
          DOCKER_BUILDKIT=1 docker build -f $(dockerfilePath) -t $(imageRepo):$(imageTag) .
          docker tag $(imageRepo):$(imageTag) $(imageRepo):latest
        displayName: 'Docker build & tag'

      # Push image
      - bash: |
          docker push $(imageRepo):$(imageTag)
          docker push $(imageRepo):latest
        displayName: 'Docker push to ECR'

# =======================
# 3) Deploy to EKS
# =======================
- stage: Deploy_EKS
  displayName: Deploy to Amazon EKS
  dependsOn: Docker_Build_Push
  condition: succeeded()
  jobs:
  - job: deploy
    pool:
      vmImage: $(vmImage)
    steps:
      # Configure kubeconfig for EKS
      - bash: |
          aws eks update-kubeconfig --name $(eksClusterName) --region $(awsRegion)
          kubectl version --client=true
          kubectl get ns
        displayName: 'EKS: update kubeconfig & sanity check'

      # Update deployment image (in-place)
      - bash: |
          kubectl -n $(k8sNamespace) set image deployment/$(k8sDeployment) $(k8sContainer)=$(imageRepo):$(imageTag)
          kubectl -n $(k8sNamespace) rollout status deployment/$(k8sDeployment) --timeout=5m
        displayName: 'K8s: set image & wait for rollout'

      # (Alternative) Apply manifests if you package them as artifacts
      # - download: current
      #   artifact: manifests
      # - bash: |
      #     kubectl -n $(k8sNamespace) apply -f $(Pipeline.Workspace)/manifests
      #     kubectl -n $(k8sNamespace) rollout status deployment/$(k8sDeployment) --timeout=5m
      #   displayName: 'K8s: apply manifests + rollout'
Notes on the YAML above
•	SonarQube tasks and versions: Use either v6 or v7 consistently for SonarQubePrepare, SonarQubeAnalyze, and SonarQubePublish. Mixing majors can break builds; this is a known gotcha in the extension. [community....source.com] 
o	Analyze task example and JDK options (v7) are documented. [learn.microsoft.com]
o	Publish Quality Gate behavior (v6 doc; v7 is similar) is documented. [learn.microsoft.com]
o	General SonarQube extension & task modes (dotnet/other/cli) are documented by Sonar. [docs.sonarsource.com], [docs.sonarsource.com]
•	Publish test results: The PublishTestResults@2 task supports JUnit/NUnit/TRX/XUnit, etc.—we used JUnit patterns from Maven Surefire. [learn.microsoft.com]
•	ECR login & push: aws ecr get-login-password | docker login --username AWS --password-stdin <account>.dkr.ecr.<region>.amazonaws.com is the standard and token lasts ~12 hours. [docs.aws.amazon.com], [docs.aws.amazon.com] 
o	If you prefer a no bash approach, the AWS Toolkit “ECR Push” task handles tagging & auth for you. [docs.aws.amazon.com]
•	EKS deploy: aws eks update-kubeconfig sets kubeconfig for the cluster; then we do kubectl set image + rollout status. [docs.aws.amazon.com] 
o	Azure DevOps also provides KubernetesManifest & Kubectl tasks as alternatives, documented here. [learn.microsoft.com]
•	Why YAML for this: Multi stage pipeline in one file with traceability & templates support—recommended starting point by Microsoft. [learn.microsoft.com], [learn.microsoft.com]
________________________________________
Common gotchas (so you don’t get stuck)
1.	Keep Sonar task majors aligned (@6 or @7 on all three). Mixing versions can fail analysis or Quality Gate publish. [community....source.com]
2.	Hosted agent permissions to AWS: Provide AWS credentials via a secured variable group or an AWS service connection (Toolkit). If your EKS endpoint is private, use a self hosted agent inside AWS. [docs.aws.amazon.com]
3.	JUnit paths: Surefire results are typically **/target/surefire-reports/TEST-*.xml. Verify patterns if you customize Maven. [learn.microsoft.com]
4.	ECR auth: If docker login fails, confirm the region, account id, and that your user/role has ECR push permissions, and that you’re running the latest AWS CLI for get-login-password. [docs.aws.amazon.com], [docs.aws.amazon.com]

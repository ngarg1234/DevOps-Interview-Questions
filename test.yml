## 11) Challenges faced in CI/CD (ADO/Terraform) & How to overcome

1.  **Credential sprawl & secret rotation**

*   **Solution**: Use **OIDC** / federated identity for cloud auth; store secrets in **Key Vault**; reference via ADO Variable Groups; short-lived tokens.

2.  **State file locks / drift in Terraform**

*   **Solution**: Use **remote backend** (Azure Blob) with locking; run `terraform plan -refresh-only` regularly; implement drift checks as a scheduled pipeline; enforce PR plans with `terraform fmt`, `validate`, `tflint`.

3.  **Unpredictable environments**

*   **Solution**: Treat infrastructure as code fully; **immutable artifacts**; use **modules**; pin versions; maintain environment-specific `tfvars`; document tagging and naming standards.

4.  **Long plan/apply times**

*   **Solution**: Split stacks by domain (network, data, app); parallelize with multiple pipelines; cache providers; avoid unnecessary data sources.

5.  **Breaking provider/TF upgrades**

*   **Solution**: Introduce **version pinning**, run **`init -upgrade`** in feature branches, test in **dev** first, add automated **integration tests** (Terratest/kitchen) if possible.

6.  **Blue/Green/Canary coordination**

*   **Solution**: Make strategies explicit in pipeline with **environments** and **approvals**; for Kubernetes, use **rollouts** and health checks; for VMs, use **ASGs** and rolling updates.

7.  **Artifact bloat**

*   **Solution**: Build once, store minimal artifact; cleanup policies; compress; avoid embedding secrets.


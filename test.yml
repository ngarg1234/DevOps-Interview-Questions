## 2) ADO Pipelines: **Single-Stage** vs **Multi-Stage** with Deployment Strategy

### Single-Stage (simple build+deploy)

*   Useful for small apps or non‑prod.

```yaml
# azure-pipelines.yml
trigger: [ main ]
pool: vmImage: 'ubuntu-latest'

stages:
- stage: BuildAndDeploy
  jobs:
  - job: Build
    steps:
    - script: echo "Build app"; npm ci && npm run build
    - publish: $(Build.SourcesDirectory)/dist
      artifact: drop

  - deployment: DeployToDev
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
          - script: echo "Deploy to Dev using artifact"
```

### Multi-Stage (Dev → QA → Prod with gates)

*   Allows **approvals**, **checks**, and **deployment strategies** per environment.

```yaml
trigger: [ main ]

stages:
- stage: Build
  jobs:
  - job: BuildJob
    steps:
    - script: dotnet build
    - publish: $(Build.SourcesDirectory)/bin/Release
      artifact: web

- stage: Deploy_Dev
  dependsOn: Build
  jobs:
  - deployment: Dev
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: web
          - script: ./deploy-dev.sh

- stage: Deploy_Prod
  dependsOn: Deploy_Dev
  condition: succeeded()
  jobs:
  - deployment: Prod
    environment: prod
    strategy:
      runOnce:
        preDeploy:
          steps:
          - script: echo "Health checks / backups"
        deploy:
          steps:
          - download: current
            artifact: web
          - script: ./deploy-prod.sh
        routeTraffic:
          steps:
          - script: echo "Route traffic if using blue-green"
        postRouteTraffic:
          steps:
          - script: ./post-traffic-checks.sh
```

### Deployment Strategies

*   **runOnce**: default single pass.
*   **rolling**: phased rollout across targets.
*   **canary**: % traffic gradually.
*   **blueGreen**: swap slots/targets after validation.


Service Principal
A **Service Principal (SP)** is an **identity created in Azure AD for applications or automation tools**.
It allows tools like **Azure DevOps, Terraform, or scripts** to access Azure resources securely without using personal user credentials.
### Why it is used in CI/CD
In CI/CD pipelines, automation tools need permission to:
* Create resources
* Deploy infrastructure
* Access services
Instead of using a developer’s login, we use a **Service Principal**.
### Example
Terraform pipeline creating resources:
Pipeline → Uses **Service Principal credentials** → Authenticates to Azure → Creates resources.
### Components of Service Principal
1. Client ID
2. Client Secret
3. Tenant ID
4. Subscription ID

Service Connection
An **ADO object** that stores credentials for external systems (Azure, AWS, GitHub, DockerHub, etc.).
*   Ties your pipeline to the target cloud.
*   For **Azure**, you usually choose **“Service principal (automatic/manual)”** and paste SP details.
*   For **AWS**, use **Access Key/Secret** or OIDC (recommended).


**Best Practices**

*   Least privilege; avoid Owner on subscription.
*   Use federated credentials (OIDC) where possible to avoid long‑lived secrets.
*   Rotate secrets; use Azure Key Vault + variable groups.

A **Service Connection** is a secure connection between **Azure DevOps and external services**.

Example services:

* Azure
* AWS
* Docker Hub
* Kubernetes
* GitHub

### Purpose

It allows pipelines to **authenticate and deploy resources**.

### Flow

```
Pipeline
   ↓
Service Connection
   ↓
Service Principal
   ↓
Azure Resources
```

Example:

Pipeline → Service Connection → Azure Subscription → Deploy VM.


Here’s a clear and simple comparison of Service Connection vs Service Principal — especially helpful if you’re working with Azure DevOps + Azure.
________________________________________
🔵 Service Principal (SP)
A Service Principal is an identity used by applications or automation to access Azure resources securely (instead of using a real user's account).
💡 Think of it as:
➡️ A login identity for apps/scripts to authenticate to Azure.
Key properties:
•	Created in Azure Active Directory
•	Has an App ID, Client Secret, and Tenant ID
•	Gets RBAC roles like Contributor, Reader, Owner, etc.
•	Used by CLI, Terraform, scripts, automation tools
Example use:
az login --service-principal -u <appId> -p <secret> --tenant <tenantId>
________________________________________
🟣 Service Connection (Azure DevOps)
A Service Connection is a wrapper inside Azure DevOps that uses a Service Principal (or Managed Identity, etc.) to let pipelines access Azure resources.
💡 Think of it as:
➡️ A configured gateway in Azure DevOps that uses a Service Principal behind the scenes.
What it provides:
•	Secure storage of SP credentials
•	Simplified authentication for pipelines
•	RBAC based access to Azure from CI/CD jobs
•	Supports Azure, GitHub, Bitbucket, Docker, AWS, GCP, etc.
Example:
In a pipeline:
azureSubscription: 'my-service-connection'
Azure DevOps handles the authentication automatically.
________________________________________
✅ Simple Comparison Table
Feature	Service Principal	Service Connection
What it is	An identity in Azure AD	A configuration in Azure DevOps
Purpose	Authenticate apps/scripts	Allow pipelines to access Azure
Where created	Azure AD	Azure DevOps Project
Contains	App ID, Secret/Cert, Tenant	SP credentials + permissions rules
Used by	Terraform, CLI, APIs	YAML pipelines, Classic pipelines
Scope	Azure-wide	Azure DevOps only
________________________________________
🎯 Quick summary (easy to remember)
Service Principal → identity
Service Connection → Azure DevOps using that identity
________________________________________

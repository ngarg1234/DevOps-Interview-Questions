Great question, Naman. Here’s a ready to run Azure DevOps multi stage YAML pipeline that provisions cloud resources with Terraform, plus a clear explanation of what gets created and how to see the full list of resources before and after apply.
Since our last pipeline targeted AWS (ECR/EKS), I’m giving you an AWS focused example that provisions typical infra for container workloads:
•	Backend for state & locking: S3 bucket + DynamoDB table
•	Networking: VPC, public/private subnets, route tables, IGW, NAT
•	Security/Identity: Security groups, IAM roles/policies, EKS OIDC provider
•	Container platform: ECR repo, EKS cluster, managed node group
You can swap modules to target Azure/GCP similarly. (If you want an Azure version—RG, VNets, AKS, ACR, KV—say the word and I’ll translate the pipeline.)
________________________________________
🧰 Repo layout (suggested)
/infra
  /envs/prod
    backend.tf         # remote state (S3+Dynamo)
    providers.tf       # AWS provider + region
    versions.tf        # TF + providers versions
    main.tf            # calls modules (vpc, ecr, eks, etc.)
    variables.tf       # input variables
    terraform.tfvars   # prod values
    outputs.tf         # outputs you care about
Tip: Keep “envs” (dev/qa/prod) in separate folders with the same module stack and different tfvars.
________________________________________
🔁 Azure DevOps pipeline (Terraform end to end)
This pipeline does: fmt → init → validate → plan (export resources list) → manual approval → apply → post apply export.
# azure-pipelines.yml
trigger:
  branches:
    include: [ main ]

name: tf_$(Date:yyyyMMdd)$(Rev:.r)

variables:
  vmImage: 'ubuntu-latest'
  # AWS settings (use a secure variable group or an AWS service connection)
  awsRegion: 'ap-south-1'
  # Terraform working directory (per environment)
  tfWorkDir: 'infra/envs/prod'

stages:
# =========================
# 1) Validate & Plan
# =========================
- stage: Plan
  displayName: Terraform Validate & Plan
  jobs:
  - job: plan
    displayName: plan
    pool:
      vmImage: $(vmImage)
    steps:
      - checkout: self
        clean: true

      # Install Terraform (pin if you want a specific version)
      - script: |
          sudo apt-get update -y
          sudo apt-get install -y unzip jq
          curl -fsSL https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip -o tf.zip
          sudo unzip -o tf.zip -d /usr/local/bin
          terraform -version
        displayName: Install Terraform

      # Configure AWS credentials (Option A: env vars from Variable Group)
      # Make sure to mark these as secrets in a library variable group:
      # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN (if using STS)
      - script: |
          echo "Using AWS region $(awsRegion)"
          aws --version || pipx install awscli || python3 -m pip install --user awscli
        displayName: Verify AWS CLI

      - script: |
          cd $(tfWorkDir)
          terraform fmt -check -recursive
        displayName: 'terraform fmt (check)'

      - script: |
          cd $(tfWorkDir)
          terraform init -upgrade
        displayName: 'terraform init (remote backend)'

      - script: |
          cd $(tfWorkDir)
          terraform validate
        displayName: 'terraform validate'

      # Create a binary plan file and human-readable summary
      - script: |
          cd $(tfWorkDir)
          terraform plan -var-file="terraform.tfvars" -out=tfplan.bin -input=false
          # Export a human-readable plan
          terraform show tfplan.bin > tfplan.txt
          # Export machine-readable JSON (we'll parse created/changed/destroyed)
          terraform show -json tfplan.bin > tfplan.json

          # Quick summary to console: what resources are to be created/changed/destroyed
          echo "======= Planned Resource Changes (by action) ======="
          cat tfplan.json | jq -r '
            .resource_changes[]
            | {address, action: .change.actions}
            | @tsv' | column -t
        displayName: 'terraform plan (+ export tfplan.json)'

      # Publish artifacts so approvers can download & review
      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifact: tfplan'
        inputs:
          PathtoPublish: '$(tfWorkDir)'
          ArtifactName: 'tfplan'

# =========================
# 2) Manual approval gate
# =========================
- stage: Approval
  displayName: Approval (Manual)
  dependsOn: Plan
  jobs:
  - job: wait_for_approval
    pool:
      vmImage: $(vmImage)
    steps:
      - script: echo "Waiting for manual approval in Environments or Checks..."
        displayName: 'Info'
    # Tip: Use an Environment with approvals or a Manual Validation task if you prefer.
    # You can also omit this stage if you want auto-apply.

# =========================
# 3) Apply
# =========================
- stage: Apply
  displayName: Terraform Apply
  dependsOn: Approval
  condition: succeeded()
  jobs:
  - job: apply
    pool:
      vmImage: $(vmImage)
    steps:
      - checkout: self
        clean: true

      - script: |
          sudo apt-get update -y
          sudo apt-get install -y unzip jq
          curl -fsSL https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip -o tf.zip
          sudo unzip -o tf.zip -d /usr/local/bin
          terraform -version
        displayName: Install Terraform

      # Download plan artifact to ensure we apply exactly what was reviewed
      - task: DownloadBuildArtifacts@1
        displayName: 'Download tfplan artifact'
        inputs:
          buildType: 'current'
          downloadType: 'single'
          artifactName: 'tfplan'
          downloadPath: '$(Pipeline.Workspace)'

      - script: |
          cd "$(Pipeline.Workspace)/tfplan"
          terraform init -upgrade
          # Apply the exact reviewed plan (binary)
          terraform apply -input=false tfplan.bin

          # Post-apply: export state resources list for auditing
          terraform show -json > post_apply_state.json

          echo "======= Post-Apply State Resources ======="
          cat post_apply_state.json | jq -r '
            .values.root_module.resources[]
            | .address' | sort
        displayName: 'terraform apply (+ export state resources)'

      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifact: post-apply'
        inputs:
          PathtoPublish: '$(Pipeline.Workspace)/tfplan'
          ArtifactName: 'post-apply'
Why these steps?
•	terraform plan -out=tfplan.bin captures the exact actions to be approved, then terraform apply tfplan.bin guarantees you apply the same plan that reviewers saw.
•	We export tfplan.json (pre apply) and post_apply_state.json (post apply) so you can diff planned vs actual resources easily, or archive them.
________________________________________
📦 What resources are created?
Below is a representative AWS EKS + ECR + VPC stack (you can comment out modules you don’t need):
1.	Remote state & locking (recommended)
o	S3 bucket for Terraform state (server side encryption, versioning, bucket policy)
o	DynamoDB table for state locking and consistency
These keep your team from clobbering each other’s state and allow concurrent safety.
2.	Networking
o	VPC (CIDR, DNS hostnames/support)
o	Subnets: multiple public and private subnets across AZs
o	Internet Gateway and NAT Gateway(s)
o	Route tables and routes (public routes to IGW, private to NAT)
o	Subnet route table associations
3.	Security & Identity
o	Security Groups for workers and control plane endpoints as appropriate
o	IAM Roles & Policies: 
	EKS Cluster role
	Node group role(s) & policies (e.g., AmazonEKSWorkerNodePolicy, AmazonEC2ContainerRegistryReadOnly, CNI)
o	EKS OIDC Provider for IRSA (IAM Roles for Service Accounts) so Pods can assume fine grained IAM roles
4.	Container Registry
o	ECR Repository (with optional lifecycle rules, scan on push, immutable tags)
5.	Kubernetes Control Plane
o	EKS Cluster (version, logging, endpoint access, encryption, tags)
6.	Compute for workloads
o	EKS Managed Node Group (instance type, scaling min/max/desired, labels/taints, AMI family, SSH options)
This mirrors standard AWS guidance for CI/CD deployments to EKS/ECR, including how your CI runner authenticates to ECR (get-login-password) and how you access EKS (update-kubeconfig)—the same commands we used in your earlier pipeline. [docs.aws.amazon.com], [docs.aws.amazon.com], [docs.aws.amazon.com]
________________________________________
🔎 How to list “what all resources are created”
You have three helpful “views” baked into the pipeline:
1.	Before apply (review stage)
o	tfplan.json → planned changes.
Quick inventory: 
# show address + action (create/change/destroy)
jq -r '.resource_changes[] | [.address, (.change.actions|join(","))] | @tsv' tfplan.json
Or only the creates: jq -r '.resource_changes[] | select(.change.actions|index("create")) | .address' tfplan.json
2.	After apply (actual state)
o	post_apply_state.json from terraform show -json lists all resources in state: jq -r '.values.root_module.resources[].address' post_apply_state.json
3.	Outputs
o	Define friendly outputs.tf (e.g., cluster_name, ecr_url, vpc_id, private_subnets) to surface key IDs/URLs in logs.

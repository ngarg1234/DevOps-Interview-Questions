## 3) How You Keep and Upload **Artifacts** in ADO

*   Use `PublishPipelineArtifact`/`publish` to store build outputs.
*   Download artifacts in later stages/jobs with `DownloadPipelineArtifact`.

```yaml
steps:
- task: PublishPipelineArtifact@1
  inputs:
    artifactName: drop
    targetPath: '$(Build.ArtifactStagingDirectory)/output'

# Later
- task: DownloadPipelineArtifact@2
  inputs:
    artifact: drop
    path: '$(Pipeline.Workspace)/drop'
```


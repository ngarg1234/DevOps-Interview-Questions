🔧 Terraform snippets (modules wiring)
Here’s a minimal main.tf you can adapt (uses popular community modules):
# providers.tf
provider "aws" {
  region = var.region
}

# backend.tf (first run without backend, then move state; or pre-create S3/DDB)
terraform {
  backend "s3" {
    bucket         = "my-tf-state-prod"
    key            = "eks/terraform.tfstate"
    region         = "ap-south-1"
    dynamodb_table = "my-tf-locks"
    encrypt        = true
  }
}

# versions.tf
terraform {
  required_version = ">= 1.6.0"
  required_providers {
    aws = {
      source  = "hashicorp/aws"
      version = "> 5.0"
    }
  }
}

# main.tf
module "vpc" {
  source  = "terraform-aws-modules/vpc/aws"
  version = "> 5.0"

  name = "prod-vpc"
  cidr = var.vpc_cidr

  azs             = var.azs
  private_subnets = var.private_subnets
  public_subnets  = var.public_subnets

  enable_nat_gateway = true
  single_nat_gateway = false
}

module "ecr" {
  source  = "terraform-aws-modules/ecr/aws"
  version = "> 1.0"

  repository_name                 = var.ecr_name
  create_lifecycle_policy         = true
  repository_image_scan_on_push   = true
  repository_image_tag_mutability = "IMMUTABLE"
}

module "eks" {
  source  = "terraform-aws-modules/eks/aws"
  version = "> 20.0"

  cluster_name    = var.cluster_name
  cluster_version = "1.29"

  vpc_id                         = module.vpc.vpc_id
  subnet_ids                     = module.vpc.private_subnets
  cluster_endpoint_public_access = true

  eks_managed_node_groups = {
    default = {
      instance_types = ["t3.medium"]
      min_size       = 2
      max_size       = 5
      desired_size   = 3
    }
  }
}
In your pipeline, the ECR push step will use aws ecr get-login-password … | docker login … to authenticate, and the EKS deploy step will use aws eks update-kubeconfig + kubectl—exactly as per AWS docs. [docs.aws.amazon.com], [docs.aws.amazon.com], [docs.aws.amazon.com]

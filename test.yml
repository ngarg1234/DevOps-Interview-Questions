    ```bash
    git cherry-pick <sha1> <sha2>
    ```
*   **`git stash`**: save uncommitted work temporarily.
    ```bash
    git stash push -m "wip"
    git stash pop
    ```
*   **`git log --oneline --graph --decorate --all`**: visualize history.
*   **`git bisect`**: binary search to find bad commit.


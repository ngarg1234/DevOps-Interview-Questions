## 5) Terraform: **module blocks**, **locals vs dynamic**, **provisioners**, **moved blocks**

### Module Blocks

*   Reusable units of infrastructure.

```hcl
module "vpc" {
  source = "terraform-aws-modules/vpc/aws"
  version = "5.0.0"
  name = "main"
  cidr = "10.0.0.0/16"
}
```

### `locals` vs `dynamic` blocks

*   **`locals`**: compute values once and reuse to DRY code.

```hcl
locals {
  env          = var.env
  name_prefix  = "${var.app}-${local.env}"
}
resource "aws_s3_bucket" "b" {
  bucket = "${local.name_prefix}-data"
}
```

In Terraform, locals are not truly global across modules, but they behave like global variables inside a module. Interviewers often ask this.
I'll explain in simple interview language.
________________________________________
1️⃣ Are locals global in Terraform?
❌ No — not global across the whole project
✔ They are global only within a module
Meaning:
•	Any resource in the same module can use the local value.
•	But child modules cannot access it automatically.
Example:
locals {
  app_name = "payment-service"
  env      = "dev"
}
Use anywhere in that module:
resource "aws_s3_bucket" "bucket" {
  bucket = "${local.app_name}-${local.env}-bucket"
}
________________________________________
2️⃣ How to create a "global" variable in Terraform?
Terraform doesn't have true global variables, but there are 3 common ways to simulate it.
________________________________________
Method 1️⃣ Use a locals block in root module
Root module structure:
project
 ├── main.tf
 ├── locals.tf
 ├── modules
      ├── vpc
      ├── ec2
Example:
locals {
  env = "dev"
  project = "myapp"
}
Then pass it to modules:
module "ec2" {
  source = "./modules/ec2"

  env     = local.env
  project = local.project
}
Inside module:
variable "env" {}
variable "project" {}
👉 This is the recommended way.
________________________________________
Method 2️⃣ Use variables with tfvars
variables.tf
variable "env" {}
variable "project" {}
dev.tfvars
env = "dev"
project = "myapp"
Run:
terraform apply -var-file=dev.tfvars
________________________________________
Method 3️⃣ Use terraform.tfvars (auto loaded)
Example:
env = "prod"
project = "billing"
Terraform loads it automatically.
________________________________________
3️⃣ Best Practice (Interview Answer)
Say this:
In Terraform, locals are scoped to the module where they are defined.
To share values across modules, we define locals in the root module and pass them as input variables to child modules.
________________________________________
4️⃣ Example Architecture (Real DevOps usage)
Root Module
 ├── locals.tf
 ├── main.tf
 ├── modules
       ├── vpc
       ├── eks
       ├── rds
locals.tf
locals {
  env = "dev"
  owner = "devops-team"
}
Pass to modules:
module "vpc" {
  source = "./modules/vpc"
  env    = local.env
  owner  = local.owner
}
________________________________________
🎯 One-line Interview Answer
Locals are module-scoped in Terraform. To make values global, we define locals in the root module and pass them to child modules using input variables.
________________________________________
If you're preparing for Terraform interviews, I can also explain one very confusing question interviewers ask:
👉 locals vs variables vs outputs vs data sources (with real DevOps examples).


*   **`dynamic`**: generate nested blocks **conditionally or iteratively**.

```hcl
resource "aws_security_group" "web" {
  name = "web-sg"
  dynamic "ingress" {
    for_each = var.ports
    content {
      from_port   = ingress.value
      to_port     = ingress.value
      protocol    = "tcp"
      cidr_blocks = ["0.0.0.0/0"]
    }
  }
}
```

**When/Why**

*   Use **locals** for naming, tags, computed maps/lists.
*   Use **dynamic** when the **count/attributes of nested blocks vary** based on input.

### Provisioners (use sparingly)

*   Last-resort for bootstrapping when user data/CM tool (Ansible) cannot be used.

```hcl
resource "aws_instance" "ec2" {
  # ...
  provisioner "remote-exec" {
    inline = ["sudo systemctl restart nginx"]
  }
}
```

*   Prefer **cloud-init/user\_data** (EC2), or config management. Provisioners complicate idempotency.

### `moved` blocks (state refactoring)

*   Renames resources/modules without recreation.

```hcl
moved {
  from = aws_instance.old_name
  to   = aws_instance.new_name
}
```

***

## 6) Terraform **Versioning**, **State in Blob**, **Upgrade Strategy**

### Versioning

*   Pin provider and Terraform versions.

```hcl
terraform {
  required_version = "~> 1.7.0" # example
  required_providers {
    aws = {
      source  = "hashicorp/aws"
      version = "~> 5.49"
    }
  }
}
```

### Remote State in Azure Blob (recommended for teams)

```hcl
terraform {
  backend "azurerm" {
    resource_group_name  = "rg-tfstate"
    storage_account_name = "tfstateprod123"
    container_name       = "tfstate"
    key                  = "network/prod.tfstate"
  }
}
```

*   Enable **state locking** using Azure Blob + **leases** (built-in).
*   Secure with Storage firewall and **SAS or managed identity**.

### Upgrade Strategy

1.  Read release notes (Terraform & provider).
2.  Upgrade minor first, run `terraform init -upgrade`.
3.  Fix deprecations; run `terraform validate`.
4.  Use **`-refresh-only`** plan to see drift.
5.  `terraform plan` in non-prod; peer review.
6.  Apply in lower envs first; promote.

***

## 7) Multi‑Environment Deployment Strategy

*   Separate **workspaces** (e.g., `dev`, `qa`, `prod`) OR separate state files per env.
*   Parameterize with `tfvars` per env.
*   Use **separate Azure DevOps environments** with approvals.
*   **Naming/Tagging convention**, per-env accounts/projects if strong isolation needed.
*   Promote artifacts/modules versions through environments (immutable artifact).

Example Workspaces:

```bash
terraform workspace new dev
terraform workspace select dev
terraform apply -var-file=dev.tfvars
```

***

## 8) Ternary Operation in Terraform

```hcl
# condition ? true_val : false_val
resource_count = var.enable ? 1 : 0

instance_type = var.env == "prod" ? "t3.large" : "t3.small"
```

***

## 9) ADO Pipeline: Multi deployment to **AWS EC2** and **EKS**

### Pre-req

*   Create AWS **service connection** in ADO (Access key/secret or OIDC).
*   Store kubeconfig or generate via `aws eks update-kubeconfig`.
*   Build app; publish artifacts.

```yaml
trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  appName: sample
  awsRegion: ap-south-1
  eksCluster: my-eks
  namespace: default

stages:
- stage: Build
  jobs:
  - job: build
    steps:
    - task: NodeTool@0
      inputs: { versionSpec: '18.x' }
    - script: npm ci && npm run build
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'dist'
        artifact: 'web'

- stage: Deploy_EC2
  dependsOn: Build
  jobs:
  - deployment: EC2
    environment: aws-dev
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            inputs: { artifact: 'web', path: '$(Pipeline.Workspace)/web' }
          - task: AWSCLI@1
            inputs:
              awsCredentials: 'aws-sc-dev'  # service connection name
              regionName: '$(awsRegion)'
              awsCommand: |
                aws ssm send-command \
                  --document-name "AWS-RunShellScript" \
                  --parameters commands="sudo systemctl restart myapp" \
                  --instance-ids i-0123456789abcdef0

- stage: Deploy_EKS
  dependsOn: Deploy_EC2
  jobs:
  - deployment: EKS
    environment: aws-dev
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AWSCLI@1
            inputs:
              awsCredentials: 'aws-sc-dev'
              regionName: '$(awsRegion)'
              awsCommand: |
                aws eks update-kubeconfig --name $(eksCluster) --region $(awsRegion)
          - script: |
              kubectl set image deploy/$(appName) $(appName)=<your-ecr-repo>:$(Build.BuildId) -n $(namespace)
              kubectl rollout status deploy/$(appName) -n $(namespace)
            displayName: 'Rolling update on EKS'
```

**Notes**

*   Prefer **blue/green** via Kubernetes **Deployment** with two ReplicaSets and traffic managed by Service or use canary (progressive delivery with Argo Rollouts/Flagger).

